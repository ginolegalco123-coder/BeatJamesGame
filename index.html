<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Player Shooter Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .game-container {
            width: 90%;
            max-width: 1000px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 20px;
        }

        .player-info {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            background: #f0f0f0;
            transition: all 0.3s ease;
        }

        .player-info.active {
            background: #4CAF50;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        .player-info h2 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .stat {
            font-size: 1.2em;
            margin: 5px 0;
        }

        .score {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .player-info.active .score {
            color: #fff;
        }

        .game-canvas-container {
            position: relative;
            width: 100%;
            height: 400px;
            background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
            border: 3px solid #667eea;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
            cursor: crosshair;
        }

        .target {
            position: absolute;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 30% 30%, #FFD700, #FFA500);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2em;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.1s ease;
            user-select: none;
        }

        .target:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        .target.points-1 {
            background: radial-gradient(circle at 30% 30%, #FFD700, #FFA500);
            border: 2px solid #FF8C00;
        }

        .target.points-2 {
            background: radial-gradient(circle at 30% 30%, #00FF00, #00CC00);
            border: 2px solid #009900;
        }

        .target.points-3 {
            background: radial-gradient(circle at 30% 30%, #1E90FF, #0066FF);
            border: 2px solid #0033CC;
        }

        .target.points-4 {
            background: radial-gradient(circle at 30% 30%, #FF69B4, #FF1493);
            border: 2px solid #C71585;
        }

        .target.points-5 {
            background: radial-gradient(circle at 30% 30%, #FF0000, #CC0000);
            border: 2px solid #990000;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #FF6B6B;
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #ee5a52;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            font-size: 1.3em;
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message.turn {
            background: #E3F2FD;
            color: #1565C0;
        }

        .message.game-over {
            background: #FFF3CD;
            color: #856404;
            font-size: 1.5em;
            font-weight: bold;
        }

        .message.winner {
            background: #D4EDDA;
            color: #155724;
            font-size: 1.5em;
            font-weight: bold;
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }

        .shot-indicator {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }

        .shot {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #ddd;
            border: 2px solid #999;
            transition: all 0.3s ease;
        }

        .shot.used {
            background: #FF6B6B;
            border-color: #CC0000;
        }

        .shot.available {
            background: #4CAF50;
            border-color: #2E7D32;
        }

        .title-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .title-info p {
            font-size: 1.1em;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎯 Two Player Shooter Game</h1>
        
        <div class="title-info">
            <p><strong>Rules:</strong> 5 shots per turn | Targets worth 1-5 points | First to 20 points wins!</p>
        </div>

        <div class="game-info">
            <div class="player-info" id="player1Info">
                <h2>🎮 Player 1</h2>
                <div class="stat score" id="player1Score">0</div>
                <div class="stat">Shots: <span id="player1Shots">5</span></div>
            </div>
            <div class="player-info" id="player2Info">
                <h2>👾 Player 2</h2>
                <div class="stat score" id="player2Score">0</div>
                <div class="stat">Shots: <span id="player2Shots">5</span></div>
            </div>
        </div>

        <div class="message turn" id="message">Click Start Game to begin!</div>

        <div class="game-canvas-container" id="gameCanvas"></div>

        <div class="shot-indicator" id="shotIndicator"></div>

        <div class="controls">
            <button class="btn-primary" id="startBtn" onclick="startGame()">Start Game</button>
            <button class="btn-secondary" id="resetBtn" onclick="resetGame()">Reset Game</button>
        </div>

        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-label">Current Player</div>
                <div class="stat-value" id="currentPlayer">1</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Shots Used</div>
                <div class="stat-value" id="shotsUsed">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Round Points</div>
                <div class="stat-value" id="roundPoints">0</div>
            </div>
        </div>
    </div>

    <script>
        // Game state
        const gameState = {
            player1: {
                score: 0,
                shotsRemaining: 5,
                totalShots: 5,
                turns: 0
            },
            player2: {
                score: 0,
                shotsRemaining: 5,
                totalShots: 5,
                turns: 0
            },
            currentPlayer: 1,
            currentRoundPoints: 0,
            gameActive: false,
            gameOver: false,
            target: null
        };

        const canvas = document.getElementById('gameCanvas');
        const WIN_SCORE = 20;

        // Initialize shot indicator
        function updateShotIndicator() {
            const indicator = document.getElementById('shotIndicator');
            indicator.innerHTML = '';
            const currentPlayerData = gameState.currentPlayer === 1 ? gameState.player1 : gameState.player2;
            
            for (let i = 0; i < currentPlayerData.totalShots; i++) {
                const shot = document.createElement('div');
                shot.className = 'shot';
                if (i < currentPlayerData.shotsRemaining) {
                    shot.classList.add('available');
                } else {
                    shot.classList.add('used');
                }
                indicator.appendChild(shot);
            }
        }

        // Create and position target
        function createTarget() {
            if (!gameState.gameActive) return;

            if (gameState.target) {
                gameState.target.remove();
            }

            const points = Math.floor(Math.random() * 5) + 1;
            const target = document.createElement('div');
            target.className = `target points-${points}`;
            target.textContent = points;
            
            const maxX = canvas.clientWidth - 50;
            const maxY = canvas.clientHeight - 50;
            target.style.left = Math.random() * maxX + 'px';
            target.style.top = Math.random() * maxY + 'px';

            target.onclick = (e) => {
                e.stopPropagation();
                shootTarget(points);
            };

            canvas.appendChild(target);
            gameState.target = target;

            // Auto-move target every 300ms
            const moveInterval = setInterval(() => {
                if (!gameState.gameActive || gameState.target !== target) {
                    clearInterval(moveInterval);
                    return;
                }

                let newX = Math.random() * maxX;
                let newY = Math.random() * maxY;
                target.style.left = newX + 'px';
                target.style.top = newY + 'px';
            }, 300);
        }

        // Handle shot
        function shootTarget(points) {
            if (!gameState.gameActive) return;

            const currentPlayerData = gameState.currentPlayer === 1 ? gameState.player1 : gameState.player2;
            
            if (currentPlayerData.shotsRemaining <= 0) return;

            // Add points
            gameState.currentRoundPoints += points;
            currentPlayerData.score += points;
            currentPlayerData.shotsRemaining--;

            // Update UI
            updateUI();

            // Check win condition
            if (currentPlayerData.score >= WIN_SCORE) {
                endGame(true);
                return;
            }

            // Check if turn is over
            if (currentPlayerData.shotsRemaining === 0) {
                switchPlayer();
                return;
            }

            // Create new target
            createTarget();
        }

        // Switch to next player
        function switchPlayer() {
            gameState.currentPlayer = gameState.currentPlayer === 1 ? 2 : 1;
            gameState.currentRoundPoints = 0;
            
            const currentPlayerData = gameState.currentPlayer === 1 ? gameState.player1 : gameState.player2;
            currentPlayerData.shotsRemaining = 5;
            currentPlayerData.turns++;

            updateUI();
            
            // Create new target for new player
            if (gameState.gameActive && !gameState.gameOver) {
                createTarget();
            }
        }

        // End game
        function endGame(playerWon) {
            gameState.gameActive = false;
            gameState.gameOver = true;

            if (gameState.target) {
                gameState.target.remove();
            }

            const winnerText = gameState.currentPlayer === 1 ? 'Player 1 Wins!' : 'Player 2 Wins!';
            const winnerScore = gameState.currentPlayer === 1 ? gameState.player1.score : gameState.player2.score;
            
            document.getElementById('message').className = 'message winner';
            document.getElementById('message').textContent = `🎉 ${winnerText} Final Score: ${winnerScore} points!`;
        }

        // Start game
        function startGame() {
            if (gameState.gameActive) return;

            gameState.gameActive = true;
            gameState.gameOver = false;
            gameState.currentRoundPoints = 0;
            
            document.getElementById('startBtn').disabled = true;
            
            updateUI();
            createTarget();
        }

        // Reset game
        function resetGame() {
            gameState.player1 = {
                score: 0,
                shotsRemaining: 5,
                totalShots: 5,
                turns: 0
            };
            gameState.player2 = {
                score: 0,
                shotsRemaining: 5,
                totalShots: 5,
                turns: 0
            };
            gameState.currentPlayer = 1;
            gameState.currentRoundPoints = 0;
            gameState.gameActive = false;
            gameState.gameOver = false;

            if (gameState.target) {
                gameState.target.remove();
                gameState.target = null;
            }

            document.getElementById('startBtn').disabled = false;
            updateUI();
            document.getElementById('message').className = 'message turn';
            document.getElementById('message').textContent = 'Click Start Game to begin!';
        }

        // Update UI
        function updateUI() {
            // Update scores
            document.getElementById('player1Score').textContent = gameState.player1.score;
            document.getElementById('player2Score').textContent = gameState.player2.score;

            // Update shots
            document.getElementById('player1Shots').textContent = gameState.player1.shotsRemaining;
            document.getElementById('player2Shots').textContent = gameState.player2.shotsRemaining;

            // Update active player indicator
            document.getElementById('player1Info').classList.toggle('active', gameState.currentPlayer === 1 && gameState.gameActive);
            document.getElementById('player2Info').classList.toggle('active', gameState.currentPlayer === 2 && gameState.gameActive);

            // Update stats
            document.getElementById('currentPlayer').textContent = gameState.currentPlayer;
            const currentPlayerData = gameState.currentPlayer === 1 ? gameState.player1 : gameState.player2;
            document.getElementById('shotsUsed').textContent = currentPlayerData.totalShots - currentPlayerData.shotsRemaining;
            document.getElementById('roundPoints').textContent = gameState.currentRoundPoints;

            // Update message
            if (gameState.gameActive && !gameState.gameOver) {
                const playerName = gameState.currentPlayer === 1 ? '🎮 Player 1' : '👾 Player 2';
                document.getElementById('message').className = 'message turn';
                document.getElementById('message').textContent = `${playerName}'s Turn - ${gameState.currentPlayer === 1 ? gameState.player1.shotsRemaining : gameState.player2.shotsRemaining} Shots Remaining`;
            }

            // Update shot indicator
            updateShotIndicator();
        }

        // Initialize
        updateUI();
    </script>
</body>
</html>
